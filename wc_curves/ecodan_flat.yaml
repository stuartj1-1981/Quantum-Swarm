# QSH Weather Compensation Curve: Mitsubishi Ecodan — Flat (Zone 1 High)
# Source: Mitsubishi Ecodan technical handbook, WC zone settings
#
# Piecewise-linear: outdoor_temp -> flow_temp
# Between breakpoints: linear interpolation
# Outside range: nearest endpoint (clamped)
#
# Used in QSH fleet simulation (fleet.db)
# See docs/methodology.md Section 4 for details

curve_key: ecodan_flat
label: Mitsubishi Ecodan — Flat (Zone 1 High)
source: Mitsubishi Ecodan technical handbook, WC zone settings
min_flow_c: 30.0
max_flow_c: 55.0
breakpoints:
- outdoor_c: -5
  flow_c: 55.0
- outdoor_c: 0
  flow_c: 51.0
- outdoor_c: 5
  flow_c: 47.0
- outdoor_c: 10
  flow_c: 44.0
- outdoor_c: 15
  flow_c: 41.0
- outdoor_c: 20
  flow_c: 38.0
