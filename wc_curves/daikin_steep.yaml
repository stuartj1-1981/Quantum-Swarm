# QSH Weather Compensation Curve: Daikin Altherma 3 — Steep (Heating Curve 1)
# Source: Daikin Altherma 3 technical data book, installer WC settings
#
# Piecewise-linear: outdoor_temp -> flow_temp
# Between breakpoints: linear interpolation
# Outside range: nearest endpoint (clamped)
#
# Used in QSH fleet simulation (fleet.db)
# See docs/methodology.md Section 4 for details

curve_key: daikin_steep
label: Daikin Altherma 3 — Steep (Heating Curve 1)
source: Daikin Altherma 3 technical data book, installer WC settings
min_flow_c: 25.0
max_flow_c: 48.0
breakpoints:
- outdoor_c: -5
  flow_c: 48.0
- outdoor_c: 0
  flow_c: 42.0
- outdoor_c: 5
  flow_c: 36.0
- outdoor_c: 10
  flow_c: 30.0
- outdoor_c: 15
  flow_c: 26.0
- outdoor_c: 20
  flow_c: 25.0
