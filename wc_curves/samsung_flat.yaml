- outdoor_c: 0
  flow_c: 51.0
- outdoor_c: 5
  flow_c: 47.0
- outdoor_c: 10
  flow_c: 43.0
- outdoor_c: 15
  flow_c: 40.0
- outdoor_c: 20
  flow_c: 37.0
