# QSH Weather Compensation Curve: Vaillant Arotherm+ — Moderate (Curve 0.6, default)
# Source: Vaillant Arotherm+ engineering manual, heating curve gradient
#
# Piecewise-linear: outdoor_temp -> flow_temp
# Between breakpoints: linear interpolation
# Outside range: nearest endpoint (clamped)
#
# Used in QSH fleet simulation (fleet.db)
# See docs/methodology.md Section 4 for details

curve_key: vaillant_moderate
label: Vaillant Arotherm+ — Moderate (Curve 0.6, default)
source: Vaillant Arotherm+ engineering manual, heating curve gradient
min_flow_c: 25.0
max_flow_c: 53.0
breakpoints:
- outdoor_c: -5
  flow_c: 53.0
- outdoor_c: 0
  flow_c: 47.0
- outdoor_c: 5
  flow_c: 42.0
- outdoor_c: 10
  flow_c: 37.0
- outdoor_c: 15
  flow_c: 33.0
- outdoor_c: 20
  flow_c: 29.0
