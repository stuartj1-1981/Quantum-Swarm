# QSH Weather Compensation Curve: Mitsubishi Ecodan — Steep (Zone 1 Low)
# Source: Mitsubishi Ecodan technical handbook, WC zone settings
#
# Piecewise-linear: outdoor_temp -> flow_temp
# Between breakpoints: linear interpolation
# Outside range: nearest endpoint (clamped)
#
# Used in QSH fleet simulation (fleet.db)
# See docs/methodology.md Section 4 for details

curve_key: ecodan_steep
label: Mitsubishi Ecodan — Steep (Zone 1 Low)
source: Mitsubishi Ecodan technical handbook, WC zone settings
min_flow_c: 25.0
max_flow_c: 48.0
breakpoints:
- outdoor_c: -5
  flow_c: 48.0
- outdoor_c: 0
  flow_c: 43.0
- outdoor_c: 5
  flow_c: 37.0
- outdoor_c: 10
  flow_c: 32.0
- outdoor_c: 15
  flow_c: 28.0
- outdoor_c: 20
  flow_c: 25.0
