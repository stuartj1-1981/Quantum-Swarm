# QSH Weather Compensation Curve: MCS MIS 3005 Generic Linear
# Source: MCS MIS 3005 guidance for panel radiator systems
#
# Piecewise-linear: outdoor_temp -> flow_temp
# Between breakpoints: linear interpolation
# Outside range: nearest endpoint (clamped)
#
# Used in QSH fleet simulation (fleet.db)
# See docs/methodology.md Section 4 for details

curve_key: mcs_generic
label: MCS MIS 3005 Generic Linear
source: MCS MIS 3005 guidance for panel radiator systems
min_flow_c: 25.0
max_flow_c: 50.0
breakpoints:
- outdoor_c: -5
  flow_c: 46.25
- outdoor_c: 0
  flow_c: 42.5
- outdoor_c: 5
  flow_c: 38.75
- outdoor_c: 10
  flow_c: 35.0
- outdoor_c: 15
  flow_c: 31.25
- outdoor_c: 20
  flow_c: 27.5
