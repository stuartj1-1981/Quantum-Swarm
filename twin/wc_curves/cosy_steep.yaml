# QSH Weather Compensation Curve: Octopus Cosy — Steep (Curve 1)
# Source: Octopus Energy installer manual, Cosy 6/9 WC settings
#
# Piecewise-linear: outdoor_temp -> flow_temp
# Between breakpoints: linear interpolation
# Outside range: nearest endpoint (clamped)
#
# Used in QSH fleet simulation (fleet.db)
# See docs/methodology.md Section 4 for details

curve_key: cosy_steep
label: Octopus Cosy — Steep (Curve 1)
source: Octopus Energy installer manual, Cosy 6/9 WC settings
min_flow_c: 25.0
max_flow_c: 50.0
breakpoints:
- outdoor_c: -5
  flow_c: 50.0
- outdoor_c: 0
  flow_c: 45.0
- outdoor_c: 5
  flow_c: 38.0
- outdoor_c: 10
  flow_c: 32.0
- outdoor_c: 15
  flow_c: 28.0
- outdoor_c: 20
  flow_c: 25.0
