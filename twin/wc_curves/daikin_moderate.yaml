breakpoints:
- outdoor_c: -5
  flow_c: 52.0
- outdoor_c: 0
  flow_c: 47.0
- outdoor_c: 5
  flow_c: 41.0
- outdoor_c: 10
  flow_c: 36.0
- outdoor_c: 15
  flow_c: 32.0
- outdoor_c: 20
  flow_c: 28.0
